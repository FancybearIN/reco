version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  neo4j:
    image: neo4j:5.14.0
    environment:
      - NEO4J_AUTH=neo4j/password123
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build: .
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    env_file:
      - .env.example

  orchestrator_worker:
    build: .
    command: celery -A src.orchestration.celery_app worker --loglevel=info -Q orchestrator
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    env_file:
      - .env.example

  browser_worker:
    build: .
    command: celery -A src.orchestration.celery_app worker --loglevel=info -Q browser -c 2
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    env_file:
      - .env.example
